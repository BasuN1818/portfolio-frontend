<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio 3D</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- AOS Animation -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
  </head>
  <body>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; font-size:20px; z-index:9999; position:absolute; top:0; left:0; background:black; padding:20px; border:2px solid red;">ERROR: ' + e.message + '<br>Source: ' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red; font-size:20px; z-index:9999; position:absolute; top:100px; left:0; background:black; padding:20px; border:2px solid red;">PROMISE REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
